<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIATOGEL USDT Rate Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #061426; /* Blue Dope Dark */
            --card-bg: #0b1f3a;
            --neon-gold: #ff8a00; /* Orange Neon */
            --gold-glow: rgba(255, 138, 0, 0.65);
            --neon-red: #ff4d1c;
            --red-glow: rgba(255, 77, 28, 0.55);
            --blue-accent: #00b7ff;
            --blue-glow: rgba(0, 183, 255, 0.55);
            --text-main: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- ANTI-LAG & BOLD RESET --- */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-weight: 900 !important; 
            -webkit-font-smoothing: antialiased;
            transform: translateZ(0); 
        }

        body {
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at 20% 20%, rgba(0,183,255,.22) 0%, transparent 34%), radial-gradient(circle at 85% 15%, rgba(255,138,0,.18) 0%, transparent 30%), linear-gradient(135deg, #061426 0%, #0a2344 48%, #03101f 100%);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BINGKAI LUAR KEDAP KEDIP BLUE + ORANGE --- */
        .dashboard-card {
            width: 100%;
            max-width: 900px;
            background: linear-gradient(145deg, rgba(11,31,58,.96), rgba(3,16,31,.98));
            backdrop-filter: blur(20px);
            border: 3px solid var(--neon-gold);
            border-radius: 30px;
            padding: 45px;
            position: relative;
            animation: goldBlink 2.5s infinite alternate;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.85), inset 0 0 35px rgba(0,183,255,.08);
        }

        @keyframes goldBlink {
            0% { border-color: rgba(0, 183, 255, 0.45); box-shadow: 0 0 14px var(--blue-glow); }
            100% { border-color: var(--neon-gold); box-shadow: 0 0 42px var(--gold-glow), 0 0 24px var(--blue-glow); }
        }

        /* --- TITLE JELAS / TIDAK BURAM --- */
        @keyframes titleGlow {
            0%, 100% {
                filter: drop-shadow(0 0 6px rgba(0, 183, 255, .55)) drop-shadow(0 0 10px rgba(255, 138, 0, .30));
            }
            50% {
                filter: drop-shadow(0 0 10px rgba(0, 183, 255, .75)) drop-shadow(0 0 14px rgba(255, 138, 0, .45));
            }
        }

        .header { 
            text-align: center; 
            margin-bottom: 40px; 
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(28px, 5vw, 46px);
            line-height: 1.25;
            color: #ffffff;
            -webkit-text-fill-color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow:
                2px 2px 0 #08213d,
                0 0 4px rgba(0, 183, 255, .95),
                0 0 8px rgba(255, 138, 0, .55);
            animation: titleGlow 2.6s ease-in-out infinite;
        }

        .header h1 span {
            display: inline-block;
            opacity: 1;
            animation: none !important;
            text-shadow: inherit;
        }

        .inner-section {
            background: linear-gradient(145deg, rgba(1,10,20,.72), rgba(7,34,65,.72));
            border: 2px solid rgba(0, 183, 255, 0.22);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            color: var(--neon-gold);
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--gold-glow);
        }

        textarea, input {
            width: 100%;
            background: rgba(0, 10, 24, .88);
            border: 2px solid rgba(0,183,255,.24);
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-family: 'Rajdhani', sans-serif;
            outline: none;
            transition: var(--transition);
        }

        textarea:focus, input:focus {
            border-color: var(--neon-gold);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        /* UKURAN TEXTAREA */
        textarea#rawInput {
            height: 160px; 
            font-size: 16px;
            line-height: 1.6;
            border-left: 5px solid var(--blue-accent);
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

        /* --- CONTAINER SCAN GOLD --- */
        .scan-container { position: relative; overflow: hidden; border-radius: 12px; }
        
        .scan-line {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--neon-gold);
            box-shadow: 0 0 25px var(--neon-gold);
            z-index: 10;
        }

        .scan-text-overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            color: var(--neon-gold);
            text-shadow: 0 0 20px var(--neon-gold);
            z-index: 11;
            letter-spacing: 5px;
            white-space: nowrap;
            pointer-events: none;
        }

        .scanning .scan-line { display: block; animation: scanAction 1.2s linear infinite; }
        .scanning .scan-text-overlay { display: block; animation: blinkText 0.5s infinite alternate; }
        .scanning textarea { opacity: 0.2; }

        @keyframes scanAction { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes blinkText { from { opacity: 0.4; } to { opacity: 1; } }

        .btn-group { display: flex; gap: 20px; margin-bottom: 30px; }
        button {
            flex: 1; padding: 20px; border-radius: 15px; border: none;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            font-size: 15px;
            transition: var(--transition);
        }

        .btn-generate { 
            background: linear-gradient(90deg, var(--blue-accent), var(--neon-gold)); 
            color: #00101f; 
            box-shadow: 0 0 20px var(--gold-glow); 
        }
        .btn-generate:hover { transform: scale(1.02); box-shadow: 0 0 35px var(--neon-gold); filter: brightness(1.2); }
        
        .btn-reset { 
            background: transparent; 
            color: var(--neon-gold); 
            border: 2px solid var(--neon-gold); 
        }
        .btn-reset:hover { background: var(--neon-red); color: white; box-shadow: 0 0 20px var(--red-glow); }

        .footer-credit {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 3px;
            color: var(--neon-gold);
            text-shadow: 0 0 10px var(--gold-glow);
            padding: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            text-transform: uppercase;
        }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, var(--blue-accent), var(--neon-gold)); color: #00101f; padding: 15px 40px;
            border-radius: 50px; display: none;
            box-shadow: 0 0 30px var(--neon-gold); z-index: 1000;
            font-family: 'Orbitron', sans-serif;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-gold); border-radius: 10px; }

        @media (max-width: 600px) {
            body { padding: 20px 12px; }
            .dashboard-card { padding: 24px 16px; border-radius: 22px; }
            .header h1 { font-size: 27px; letter-spacing: 1.5px; }
            .grid-2 { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="header">
            <h1>
                <span>U</span><span>S</span><span>D</span><span>T</span> &nbsp;
                <span>R</span><span>A</span><span>T</span><span>E</span> &nbsp;
                <span>G</span><span>E</span><span>N</span><span>E</span><span>R</span><span>A</span><span>T</span><span>O</span><span>R</span>
            </h1>
        </div>

        <div class="inner-section">
            <label>📡 ANALYZE DATA CORE (PASTE RAW REPORT)</label>
            <div class="scan-container" id="scanWrapper">
                <div class="scan-line"></div>
                <div class="scan-text-overlay">ZIATOGEL SCANNING...</div>
                <textarea id="rawInput" placeholder="PASTE DATA RAW REPORT DISINI UNTUK SCAN OTOMATIS..." oninput="autoFillData()"></textarea>
            </div>
        </div>

        <div class="inner-section">
            <div class="grid-2">
                <div class="input-box">
                    <label>RATIO DEPOSIT</label>
                    <input type="text" id="depoRatio" placeholder="16854">
                </div>
                <div class="input-box">
                    <label>RATIO WITHDRAW</label>
                    <input type="text" id="wdRatio" placeholder="17024">
                </div>
            </div>

            <div class="input-box" style="margin-bottom: 25px;">
                <label>TIMESTAMP UPDATE</label>
                <input type="text" id="manualTime">
            </div>

            <div class="grid-2">
                <div class="input-box">
                    <label>LAMPIRAN URL 1</label>
                    <input type="text" id="link1" placeholder="HTTPS://...">
                </div>
                <div class="input-box">
                    <label>LAMPIRAN URL 2</label>
                    <input type="text" id="link2" placeholder="HTTPS://...">
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-generate" onclick="generateAndCopy()">GENERATE & AUTO COPY</button>
            <button class="btn-reset" onclick="resetForm()">RESET SYSTEM</button>
        </div>

        <div class="footer-credit">
            Official System Security • Created by Ziatogel
        </div>
    </div>

    <div id="toast">SYSTEM: REPORT COPIED!</div>

    <script>
        function formatWithComma(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function autoFillData() {
            const rawText = document.getElementById('rawInput').value;
            const depoMatch = rawText.match(/Deposit\s*[:]\s*([\d,.]+)/i);
            const wdMatch = rawText.match(/Withdraw\s*[:]\s*([\d,.]+)/i);
            
            if (depoMatch) {
                document.getElementById('depoRatio').value = depoMatch[1].replace(/[,.]/g, '');
            }
            if (wdMatch) {
                document.getElementById('wdRatio').value = wdMatch[1].replace(/[,.]/g, '');
            }
        }

        window.onload = function() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('manualTime').value = (hours < 10 ? '0' + hours : hours) + ':' + minutes + ' ' + ampm;
        };

        function generateAndCopy() {
            const wrapper = document.getElementById('scanWrapper');
            const depoRaw = document.getElementById('depoRatio').value;
            const wdRaw = document.getElementById('wdRatio').value;

            if (!depoRaw || !wdRaw) { alert("ERROR: ISI DATA TERLEBIH DAHULU!"); return; }

            wrapper.classList.add('scanning');

            setTimeout(() => {
                const time = document.getElementById('manualTime').value;
                const l1 = document.getElementById('link1').value || '-';
                const l2 = document.getElementById('link2').value || '-';
                const d = new Date();
                const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
                const fullDate = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

                const finalDepo = formatWithComma(depoRaw.replace(/[,.]/g, ''));
                const finalWd = formatWithComma(wdRaw.replace(/[,.]/g, ''));

                const report = `RATE SEKARANG\nUsdt Ratio Deposit : ${finalDepo}\nUsdt Ratio Withdraw : ${finalWd}\nUPDATE : ${fullDate} (${time})\nLampiran :\n${l1}\n${l2}`;

                navigator.clipboard.writeText(report).then(() => {
                    wrapper.classList.remove('scanning');
                    const toast = document.getElementById("toast");
                    toast.style.display = "block";
                    setTimeout(() => { toast.style.display = "none"; }, 2000);
                });

            }, 1200);
        }

        function resetForm() { location.reload(); }
    </script>
</body>
</html>
