<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZIATOGEL USDT Rate Generator</title>
  <style>
    :root{
      --bg:#061426;--bg2:#0b1f3a;--panel:#071a31;--blue:#00b7ff;--orange:#ff8a00;--orange2:#ff4d1c;--text:#fff;--muted:#8fb7d8;
      --blueGlow:rgba(0,183,255,.55);--orangeGlow:rgba(255,138,0,.55);--transition:all .25s ease;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-weight:800;-webkit-font-smoothing:antialiased}
    body{
      min-height:100vh;padding:34px 18px;color:var(--text);font-family:Arial,Helvetica,sans-serif;display:flex;justify-content:center;
      background:radial-gradient(circle at 20% 10%,rgba(0,183,255,.22),transparent 32%),radial-gradient(circle at 85% 18%,rgba(255,138,0,.18),transparent 30%),linear-gradient(135deg,#061426,#0a2344 50%,#03101f);
    }
    .dashboard-card{width:100%;max-width:920px;background:linear-gradient(145deg,rgba(11,31,58,.98),rgba(3,16,31,.98));border:2px solid var(--blue);border-radius:28px;padding:38px;box-shadow:0 0 35px rgba(0,0,0,.75),0 0 25px var(--blueGlow),inset 0 0 35px rgba(0,183,255,.06)}
    .header{text-align:center;margin-bottom:34px;padding:22px 14px;border:1px solid rgba(0,183,255,.35);border-radius:20px;background:linear-gradient(90deg,rgba(0,183,255,.08),rgba(255,138,0,.09));box-shadow:inset 0 0 24px rgba(0,183,255,.08)}
    .header h1{font-size:clamp(28px,5vw,46px);line-height:1.2;letter-spacing:2px;color:#fff;text-transform:uppercase;text-shadow:0 2px 0 #001326,0 0 6px var(--blue),0 0 12px rgba(255,138,0,.55)}
    .title-orange{color:var(--orange);text-shadow:0 2px 0 #201000,0 0 5px var(--orange),0 0 10px var(--orangeGlow)}
    .sub-title{margin-top:10px;color:var(--muted);letter-spacing:3px;font-size:13px;text-transform:uppercase}
    .inner-section{background:rgba(0,0,0,.34);border:1px solid rgba(0,183,255,.28);border-radius:18px;padding:24px;margin-bottom:22px;box-shadow:inset 0 0 18px rgba(0,183,255,.05)}
    label{display:block;font-size:13px;color:var(--orange);margin-bottom:12px;letter-spacing:1.5px;text-transform:uppercase;text-shadow:0 0 7px var(--orangeGlow)}
    textarea,input{width:100%;background:#03101f;border:2px solid rgba(0,183,255,.28);border-radius:12px;color:#fff;padding:14px;font-size:16px;outline:none;transition:var(--transition)}
    textarea:focus,input:focus{border-color:var(--orange);box-shadow:0 0 14px var(--orangeGlow)}
    textarea#rawInput{height:160px;line-height:1.55;border-left:5px solid var(--orange);resize:vertical}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
    .scan-container{position:relative;overflow:hidden;border-radius:12px}
    .scan-line,.scan-text-overlay{display:none}.scan-line{position:absolute;left:0;top:0;width:100%;height:4px;background:var(--orange);box-shadow:0 0 22px var(--orange);z-index:5}.scan-text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;color:#fff;text-shadow:0 0 10px var(--blue),0 0 14px var(--orange);z-index:6;letter-spacing:4px;white-space:nowrap}.scanning .scan-line{display:block;animation:scanAction 1.2s linear infinite}.scanning .scan-text-overlay{display:block}.scanning textarea{opacity:.24}@keyframes scanAction{0%{top:0}100%{top:100%}}
    .btn-group{display:flex;gap:18px;margin:26px 0}.btn{flex:1;padding:18px;border-radius:14px;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:1.5px;font-size:14px;transition:var(--transition)}
    .btn-generate{background:linear-gradient(135deg,var(--orange),#ffc400);color:#061426;box-shadow:0 0 18px var(--orangeGlow)}.btn-generate:hover{transform:translateY(-2px);filter:brightness(1.08)}
    .btn-reset{background:transparent;color:var(--orange2);border:2px solid var(--orange2)}.btn-reset:hover{background:var(--orange2);color:#fff;box-shadow:0 0 16px rgba(255,77,28,.5)}
    .footer-credit{text-align:center;font-size:13px;letter-spacing:2px;color:var(--blue);text-shadow:0 0 8px var(--blueGlow);padding-top:18px;border-top:1px solid rgba(0,183,255,.16);text-transform:uppercase}
    #toast{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);background:var(--orange);color:#061426;padding:14px 34px;border-radius:40px;display:none;box-shadow:0 0 24px var(--orange);z-index:10;font-weight:900}
    @media(max-width:640px){.dashboard-card{padding:22px}.grid-2,.btn-group{grid-template-columns:1fr;display:grid}.header h1{font-size:30px}.sub-title{font-size:11px}}
  </style>
</head>
<body>
  <main class="dashboard-card">
    <header class="header">
      <h1>USDT <span class="title-orange">RATE</span> GENERATOR</h1>
      <div class="sub-title">ZIATOGEL OFFICIAL SYSTEM</div>
    </header>

    <section class="inner-section">
      <label>Analyze Data Core - Paste Raw Report</label>
      <div class="scan-container" id="scanWrapper">
        <div class="scan-line"></div>
        <div class="scan-text-overlay">ZIATOGEL SCANNING...</div>
        <textarea id="rawInput" placeholder="PASTE DATA RAW REPORT DISINI UNTUK SCAN OTOMATIS..." oninput="autoFillData()"></textarea>
      </div>
    </section>

    <section class="inner-section">
      <div class="grid-2">
        <div><label>Ratio Deposit</label><input type="text" id="depoRatio" placeholder="16854"></div>
        <div><label>Ratio Withdraw</label><input type="text" id="wdRatio" placeholder="17024"></div>
      </div>
      <div style="margin-bottom:18px"><label>Timestamp Update</label><input type="text" id="manualTime"></div>
      <div class="grid-2">
        <div><label>Lampiran URL 1</label><input type="text" id="link1" placeholder="HTTPS://..."></div>
        <div><label>Lampiran URL 2</label><input type="text" id="link2" placeholder="HTTPS://..."></div>
      </div>
    </section>

    <div class="btn-group">
      <button class="btn btn-generate" onclick="generateAndCopy()">Generate & Auto Copy</button>
      <button class="btn btn-reset" onclick="resetForm()">Reset System</button>
    </div>

    <div class="footer-credit">Official System Security • Created by Ziatogel</div>
  </main>
  <div id="toast">SYSTEM: REPORT COPIED!</div>

  <script>
    function formatWithComma(num){return String(num).replace(/\D/g,'').replace(/\B(?=(\d{3})+(?!\d))/g,',')}
    function autoFillData(){
      var rawText=document.getElementById('rawInput').value;
      var depoMatch=rawText.match(/Deposit\s*:\s*([\d,.]+)/i);
      var wdMatch=rawText.match(/Withdraw\s*:\s*([\d,.]+)/i);
      if(depoMatch){document.getElementById('depoRatio').value=depoMatch[1].replace(/[,.]/g,'')}
      if(wdMatch){document.getElementById('wdRatio').value=wdMatch[1].replace(/[,.]/g,'')}
    }
    function setCurrentTime(){
      var now=new Date(),hours=now.getHours(),minutes=now.getMinutes(),ampm=hours>=12?'PM':'AM';
      hours=hours%12||12;minutes=minutes<10?'0'+minutes:minutes;
      document.getElementById('manualTime').value=(hours<10?'0'+hours:hours)+':'+minutes+' '+ampm;
    }
    function copyText(text){
      if(navigator.clipboard&&window.isSecureContext){return navigator.clipboard.writeText(text)}
      var area=document.createElement('textarea');area.value=text;area.style.position='fixed';area.style.left='-9999px';document.body.appendChild(area);area.focus();area.select();document.execCommand('copy');document.body.removeChild(area);return Promise.resolve();
    }
    function generateAndCopy(){
      var wrapper=document.getElementById('scanWrapper');
      var depoRaw=document.getElementById('depoRatio').value;
      var wdRaw=document.getElementById('wdRatio').value;
      if(!depoRaw||!wdRaw){alert('ERROR: ISI DATA TERLEBIH DAHULU!');return}
      wrapper.classList.add('scanning');
      setTimeout(function(){
        var time=document.getElementById('manualTime').value;
        var l1=document.getElementById('link1').value||'-';
        var l2=document.getElementById('link2').value||'-';
        var d=new Date();
        var months=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
        var fullDate=d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
        var report='RATE SEKARANG\nUsdt Ratio Deposit : '+formatWithComma(depoRaw)+'\nUsdt Ratio Withdraw : '+formatWithComma(wdRaw)+'\nUPDATE : '+fullDate+' ('+time+')\nLampiran :\n'+l1+'\n'+l2;
        copyText(report).then(function(){
          wrapper.classList.remove('scanning');
          var toast=document.getElementById('toast');toast.style.display='block';setTimeout(function(){toast.style.display='none'},2000);
        });
      },1200);
    }
    function resetForm(){document.getElementById('rawInput').value='';document.getElementById('depoRatio').value='';document.getElementById('wdRatio').value='';document.getElementById('link1').value='';document.getElementById('link2').value='';setCurrentTime()}
    window.onload=setCurrentTime;
  </script>
</body>
</html>
